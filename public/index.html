<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pokering Points</title>
    <link rel="stylesheet" href="/css/theme-variables.css" />
    <link rel="stylesheet" href="/css/version-badge.css" />
    <link rel="stylesheet" href="/css/index.css" />
    <script src="/javascript/theme-loader.js"></script>
    <script src="/javascript/vendor/socket.io.min.js"></script>
    <script src="/javascript/index.js" defer></script>
  </head>
  <body>
    <button id="newSessionBtn">🔁 New Session</button>
    <select id="deckSelector" class="hidden">
      <option value="fibonacci">Fibonacci (1-21)</option>
      <option value="hours">Hours (1-40)</option>
      <option value="tshirt">T-Shirt (XS-XXL)</option>
    </select>
    <a
      id="versionBadge"
      class="version-badge"
      href="/changelog.html"
      target="_blank"
      aria-label="App version"
    ></a>
    <div id="versionTooltip" class="version-tooltip"></div>
    <div id="mainContent" class="flex-container hidden">
      <div id="pokerScreen" class="container">
        <div class="controls-row">
          <button id="newRoundBtn" class="hidden">➡️ Start New Round</button>
          <button id="toggleVotingBtn" class="hidden">🔒 Unlock Voting</button>
          <button id="toggleSpectateBtn" class="hidden">👁 Spectate</button>
          <button id="copyLinkBtn">🔗 Copy Session Link</button>
        </div>
        <h2>Pick your estimate</h2>
        <div id="status" aria-live="polite" aria-atomic="true"></div>
        <div id="votingLockedIndicator" class="voting-locked-indicator hidden" aria-live="polite">
          🔒
        </div>
        <div class="card-options" id="cardOptions"></div>
        <div id="countdown"></div>
        <div id="votesDisplay"></div>
        <div id="voteSummary"></div>
      </div>
      <div id="userList">
        <div class="user-list-header">
          <h3>Users</h3>
          <span id="userCount" class="user-count"></span>
        </div>
        <div id="userListContent"></div>
      </div>
    </div>
    <div id="modalBackdrop" class="hidden" role="dialog" aria-modal="true">
      <div id="modalContent">
        <p id="modalMessage"></p>
        <div id="modalError" class="error-message"></div>
        <button id="modalConfirm">OK</button>
        <button id="modalCancel">Cancel</button>
      </div>
    </div>
    <div
      id="hostSettingsBackdrop"
      class="host-settings-backdrop hidden"
      role="dialog"
      aria-modal="true"
      aria-labelledby="hostSettingsTitle"
    >
      <div id="hostSettingsContent" class="host-settings-content">
        <h3 id="hostSettingsTitle">Session Settings</h3>
        <p class="host-settings-subtitle">You are the host. Configure before joining.</p>
        <div id="hostUsernameRow" class="host-username-row hidden">
          <input
            type="text"
            id="hostUsernameInput"
            maxlength="30"
            placeholder="Your name"
            autocomplete="off"
          />
          <div id="hostUsernameError" class="error-message"></div>
        </div>
        <div class="toggle-row">
          <span>Join voting</span>
          <label class="toggle-switch">
            <input type="checkbox" id="toggleJoinVoting" checked />
            <span class="toggle-slider"></span>
          </label>
        </div>
        <div class="toggle-row">
          <span>Enable voting from start</span>
          <label class="toggle-switch">
            <input type="checkbox" id="toggleVotingEnabled" checked />
            <span class="toggle-slider"></span>
          </label>
        </div>
        <button id="hostSettingsConfirm">Join Session</button>
      </div>
    </div>
    <div id="toastContainer" aria-live="polite" aria-atomic="false"></div>
    <div id="hostLeftOverlay" class="host-left-overlay hidden">
      <div class="host-left-message">
        <h2>The host has left the session</h2>
        <p>This session is no longer active.</p>
        <button id="hostLeftNewSession">Start a New Session</button>
      </div>
    </div>
  </body>
</html>
