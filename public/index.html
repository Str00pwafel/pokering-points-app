<!DOCTYPE html>
<html lang="en">
<head>
   <meta charset="UTF-8" />
   <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
   <title>Pokering Points</title>
   <link rel="stylesheet" href="/css/theme-variables.css" />
   <link rel="stylesheet" href="/css/index.css" />
   <script src="/javascript/theme-loader.js"></script>
   <script src="https://cdn.jsdelivr.net/npm/socket.io-client@4.7.2/dist/socket.io.min.js"></script>
   <script src="/javascript/index.js" defer></script>
   <style>
      .version-badge {
         position: fixed;
         top: 8px;
         right: 10px;
         padding: 2px 8px;
         border-radius: 10px;
         font-size: 12px;
         opacity: 0.8;
         background: rgba(0,0,0,0.55);
         color: #fff;
         z-index: 9999;
         user-select: none;
         cursor: pointer;
         text-decoration: none;
      }
      .version-tooltip {
         display: none;
         position: fixed;
         top: 32px;
         right: 10px;
         background: rgba(0,0,0,0.85);
         color: #fff;
         padding: 10px 14px;
         border-radius: 8px;
         font-size: 12px;
         z-index: 9999;
         max-width: 680px;
         line-height: 1.5;
      }
      .version-badge:hover + .version-tooltip:not(:empty),
      .version-tooltip:not(:empty):hover {
         display: block;
      }
      .version-tooltip h4 {
         margin: 0 0 6px;
         font-size: 13px;
      }
      .version-tooltip ul {
         margin: 0;
         padding-left: 0;
         list-style: none;
      }
      .version-tooltip li {
         margin-bottom: 2px;
         padding-left: 12px;
         text-indent: -8px;
      }
      .version-tooltip li::before {
         content: "•";
         margin-right: 4px;
      }
   </style>
</head>
<body>
   <button id="newSessionBtn">🔁 New Session</button>
   <select id="deckSelector" style="display:none;">
      <option value="fibonacci">Fibonacci (1-21)</option>
      <option value="hours">Hours (1-40)</option>
      <option value="tshirt">T-Shirt (XS-XXL)</option>
   </select>
   <a id="versionBadge" class="version-badge" href="/changelog.html" target="_blank" aria-label="App version"></a>
   <div id="versionTooltip" class="version-tooltip"></div>
   <div id="mainContent" class="flex-container hidden">
      <div id="pokerScreen" class="container">
         <h1 id="welcomeUser"></h1>
         <div style="margin-top: 10px;">
            <button id="newRoundBtn" style="display:none;">➡️ Start New Round</button>
            <button id="toggleVotingBtn" style="display:none;">🔒 Unlock Voting</button>
            <button id="copyLinkBtn">🔗 Copy Session Link</button>
         </div>
         <h2>Pick your estimate</h2>
         <div id="status"></div>
         <div id="votingLockedIndicator" class="voting-locked-indicator hidden" aria-live="polite">🔒</div>
         <div class="card-options" id="cardOptions"></div>
         <div id="countdown"></div>
         <div id="votesDisplay"></div>
         <div id="voteSummary"></div>
      </div>
      <div id="userList">
         <div class="user-list-header">
            <h3>Users</h3>
            <span id="userCount" class="user-count"></span>
         </div>
         <div id="userListContent"></div>
      </div>
   </div>
   <div id="modalBackdrop" class="hidden" role="dialog" aria-modal="true">
      <div id="modalContent">
         <p id="modalMessage"></p>
         <div id="modalError" class="error-message"></div>
         <button id="modalConfirm">OK</button>
         <button id="modalCancel">Cancel</button>
      </div>
   </div>
   <div id="hostSettingsBackdrop" class="host-settings-backdrop hidden" role="dialog" aria-modal="true" aria-labelledby="hostSettingsTitle">
      <div id="hostSettingsContent" class="host-settings-content">
         <h3 id="hostSettingsTitle">Session Settings</h3>
         <p class="host-settings-subtitle">You are the host. Configure before joining.</p>
         <div class="toggle-row">
            <span>Join voting</span>
            <label class="toggle-switch">
               <input type="checkbox" id="toggleJoinVoting" checked>
               <span class="toggle-slider"></span>
            </label>
         </div>
         <div class="toggle-row">
            <span>Enable voting from start</span>
            <label class="toggle-switch">
               <input type="checkbox" id="toggleVotingEnabled" checked>
               <span class="toggle-slider"></span>
            </label>
         </div>
         <button id="hostSettingsConfirm">Join Session</button>
      </div>
   </div>
   <div id="toastContainer" aria-live="polite" aria-atomic="false"></div>
   <div id="hostLeftOverlay" class="host-left-overlay hidden">
      <div class="host-left-message">
         <h2>The host has left the session</h2>
         <p>This session is no longer active.</p>
         <button id="hostLeftNewSession">Start a New Session</button>
      </div>
   </div>
</body>
</html>
