<!DOCTYPE html>
<html lang="en">
<head>
   <meta charset="UTF-8" />
   <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
   <title>Pokering Points</title>
   <link rel="stylesheet" href="/css/theme-variables.css" />
   <link rel="stylesheet" href="/css/welcome.css" />
   <script src="/javascript/theme-loader.js"></script>
   <script src="/javascript/welcome.js"></script>
   <style>
      .version-badge {
         position: fixed;
         top: 8px;
         right: 10px;
         padding: 2px 8px;
         border-radius: 10px;
         font-size: 12px;
         opacity: 0.8;
         background: rgba(0,0,0,0.55);
         color: #fff;
         z-index: 9999;
         user-select: none;
         cursor: default;
      }
      .version-tooltip {
         display: none;
         position: fixed;
         top: 32px;
         right: 10px;
         background: rgba(0,0,0,0.85);
         color: #fff;
         padding: 10px 14px;
         border-radius: 8px;
         font-size: 12px;
         z-index: 9999;
         max-width: 340px;
         line-height: 1.5;
      }
      .version-badge:hover + .version-tooltip,
      .version-tooltip:hover {
         display: block;
      }
      .version-tooltip h4 {
         margin: 0 0 6px;
         font-size: 13px;
      }
      .version-tooltip ul {
         margin: 0;
         padding-left: 16px;
      }
      .version-tooltip li {
         margin-bottom: 2px;
      }
   </style>
</head>
<body>
   <div id="versionBadge" class="version-badge" aria-label="App version"></div>
   <div id="versionTooltip" class="version-tooltip"></div>
   <img src="images/beardcraft.png" alt="Beardcraft Logo" class="logo" />
   <h1>Welcome to Pokering Points</h1>
   <button id="startSessionBtn">Start a Poker Session</button>
   <div class="footer">
      JavaScript must be enabled to use this application.
   </div>
   <noscript>
      <style>body { display: none; }</style>
      <div>Please enable JavaScript to use Pokering Points.</div>
   </noscript>
</body>
</html>
