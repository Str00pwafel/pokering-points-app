name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Actions pinned by commit SHA (tag comments for readability) to protect
# against tag-moving supply-chain attacks. Bump by updating SHA + comment.
jobs:
  python:
    name: Python lint + tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.13'
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt
      - name: Ruff
        run: ruff check .
      - name: Black
        run: black --check .
      - name: Pytest
        run: pytest
      - name: Dependency audit
        run: pip-audit -r requirements.txt

  javascript:
    name: JS lint + format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '20'
          cache: npm
      - name: Install deps
        run: npm ci
      - name: Prettier
        run: npm run format
      - name: ESLint
        run: npm run lint
      - name: Dependency audit
        run: npm run audit:deps
